<div class="dashboard">
  <main class="content">
    <div class="dashboard-header">
      <h1>Welcome, Seller</h1>
      <nav class="dashboard-nav">
        <a href="#" class="active">Overview</a>
        <a href="#">My Products</a>
        <a href="#">Orders</a>
        <a href="#">Reviews</a>
        <a href="#">Analytics</a>
      </nav>
    </div>

    <div class="cards" *ngIf="!loading; else skeleton">
      <div class="card">
        <span class="label">My Products</span>
        <span class="value">{{ stats.myProducts }}</span>
      </div>
      <div class="card">
        <span class="label">Orders</span>
        <span class="value">{{ stats.myOrders }}</span>
      </div>
      <div class="card">
        <span class="label">Revenue</span>
        <span class="value">${{ stats.myRevenue | number:'1.2-2' }}</span>
      </div>
      <div class="card">
        <span class="label">Reviews</span>
        <span class="value">{{ stats.myReviews }}</span>
      </div>
    </div>

    <ng-template #skeleton>
      <div class="cards">
        <div class="card skeleton" *ngFor="let i of [1,2,3,4]">
          <span class="label">Loading...</span>
          <span class="value">—</span>
        </div>
      </div>
    </ng-template>
  </main>
</div>

<app-chatbot />
