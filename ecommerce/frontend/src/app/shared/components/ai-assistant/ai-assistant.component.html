<!-- Floating Toggle Button -->
<button
  class="chat-trigger"
  (click)="toggleChat()"
  [class.chat-trigger--open]="isOpen"
  aria-label="AI Assistant"
  id="ai-chat-toggle"
>
  <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    <path d="M8 10h.01M12 10h.01M16 10h.01"></path>
  </svg>
  <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
  <span class="chat-trigger__pulse" *ngIf="!isOpen"></span>
</button>

<!-- Chat Panel -->
<div class="chat-panel" [class.chat-panel--open]="isOpen" aria-live="polite">

  <!-- Header -->
  <div class="chat__header">
    <div class="chat__header-info">
      <div class="chat__avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <div>
        <p class="chat__name">AI Assistant</p>
        <p class="chat__status">
          <span class="chat__status-dot"></span>
          Online
        </p>
      </div>
    </div>
    <button class="chat__close" (click)="toggleChat()" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="chat__messages">
    <div
      *ngFor="let msg of messages"
      class="chat__message"
      [class.chat__message--user]="msg.role === 'user'"
      [class.chat__message--assistant]="msg.role === 'assistant'"
    >
      <div class="chat__bubble">
        <div class="chat__bubble-text" [innerHTML]="formatMessage(msg.text)"></div>
        <span class="chat__time">{{ msg.timestamp | date:'HH:mm' }}</span>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div *ngIf="isTyping" class="chat__message chat__message--assistant">
      <div class="chat__bubble chat__bubble--typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>
  </div>

  <!-- Quick Replies -->
  <div class="chat__quick-replies" *ngIf="messages.length <= 1">
    <button
      *ngFor="let qr of quickReplies"
      class="quick-reply-btn"
      (click)="sendQuickReply(qr)"
    >
      {{ qr }}
    </button>
  </div>

  <!-- Input -->
  <div class="chat__input-area">
    <input
      id="ai-chat-input"
      type="text"
      class="chat__input"
      placeholder="Ask something..."
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      [disabled]="isTyping"
    />
    <button
      class="chat__send"
      (click)="send()"
      [disabled]="!inputText.trim() || isTyping"
      aria-label="Send"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>
